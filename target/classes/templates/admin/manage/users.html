<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<body>
<div layout:fragment="content">
    <h2>Manage Users</h2>
    <form method="post" action="/admin/manage/users" class="row g-3 mb-4">
        <div class="col-md-3"><input class="form-control" name="username" placeholder="Username" required/></div>
        <div class="col-md-3"><input class="form-control" name="email" type="email" placeholder="Email" required/></div>
        <div class="col-md-2"><input class="form-control" name="password" type="password" placeholder="Password" required/></div>
        <div class="col-md-4">
            <select name="roleIds" multiple class="form-select" required>
                <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.name}"></option>
            </select>
        </div>
        <div class="col-md-12"><button class="btn btn-success">Create User</button></div>
    </form>

    <div class="mb-2">
        <button id="togglePasswords" class="btn btn-secondary btn-sm">Ẩn / Hiện mật khẩu</button>
    </div>

    <table class="table table-hover">
        <thead><tr><th>Username</th><th>Email</th><th>Password</th><th>Roles</th><th>Action</th></tr></thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.username}"></td>
            <td th:text="${user.email}"></td>
            <td class="password-cell" th:text="${user.rawPassword != null ? user.rawPassword : '---'}"></td>
            <td>
                <span th:each="role : ${user.roles}" th:text="${role.name} + ' '"/>
            </td>
            <td><a th:href="@{/admin/manage/users/delete/{id}(id=${user.id})}" class="btn btn-danger btn-sm">Delete</a></td>
        </tr>
        </tbody>
    </table>

    <script>
        const toggleBtn = document.getElementById('togglePasswords');
        let showPassword = true;
        toggleBtn.addEventListener('click', () => {
            showPassword = !showPassword;
            document.querySelectorAll('.password-cell').forEach(cell => {
                cell.style.filter = showPassword ? 'none' : 'blur(5px)';
                cell.style.webkitTextSecurity = showPassword ? 'none' : 'disc';
            });
            toggleBtn.textContent = showPassword ? 'Ẩn mật khẩu' : 'Hiện mật khẩu';
        });
    </script>
</div>
</body>
</html>
