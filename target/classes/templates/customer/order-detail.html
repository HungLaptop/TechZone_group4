<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<body>
<div layout:fragment="content" class="container">
    <h2>Chi tiết đơn hàng #<span th:text="${order.id}"></span></h2>
    <p>Ngày: <span th:text="${order.createdAt}"></span></p>
    <p>Trạng thái: <span th:text="${order.status}"></span></p>
    <p>Tổng: <span th:text="${#numbers.formatDecimal(order.total,0,'COMMA',0,'POINT')} + '₫'"></span></p>
    <h3>Sản phẩm</h3>
    <ul>
        <li th:each="item : ${order.items}" th:text="${item.product.name} + ' x' + item.quantity + ' => ' + #numbers.formatDecimal(item.unitPrice*item.quantity,0,'COMMA',0,'POINT') + '₫'"></li>
    </ul>
</div>
</body>
</html>
