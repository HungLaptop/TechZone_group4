<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<body>
<div layout:fragment="content" class="container">
    <h2>Voucher của bạn</h2>
    <ul>
        <li th:each="v : ${vouchers}">
            <span th:text="${v.code}"></span> - Giảm <span th:text="${v.discountPercent}"></span>% + <span th:text="${v.discountValue}"></span>₫
        </li>
    </ul>

    <h2>Voucher sẵn có</h2>
    <ul>
        <li th:each="v : ${available}">
            <span th:text="${v.code}"></span> - <span th:text="${v.discountPercent}"></span>% + <span th:text="${v.discountValue}"></span>₫
        </li>
    </ul>
</div>
</body>
</html>
