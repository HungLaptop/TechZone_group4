<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<body>
<div layout:fragment="content" class="container">
    <h2>Góp ý sản phẩm</h2>
    <form method="get" action="/customer/feedback" class="row g-3 mb-3">
        <div class="col-3"><input type="number" name="productId" class="form-control" placeholder="Product ID"/></div>
        <div class="col-2"><button class="btn btn-outline">Lọc</button></div>
    </form>

    <div th:if="${feedbacks} == null or #lists.isEmpty(feedbacks)">Chưa có góp ý</div>
    <div th:each="fb : ${feedbacks}">
        <h5 th:text="${fb.product.name}"></h5>
        <p><strong th:text="${fb.user.username}"></strong>: <span th:text="${fb.comment}"></span></p>
    </div>
</div>
</body>
</html>
