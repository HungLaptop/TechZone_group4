<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<body>
<div layout:fragment="content">
    <h2>Manage Products</h2>
    <form method="post" action="/staff/manage/products" class="row g-3 mb-4">
        <input type="hidden" name="id" th:value="${product?.id}"/>
        <div class="col-md-4"><input class="form-control" name="name" placeholder="Name"/></div>
        <div class="col-md-4"><input class="form-control" name="description" placeholder="Description"/></div>
        <div class="col-md-2"><input type="number" step="0.01" class="form-control" name="price" placeholder="Price"/></div>
        <div class="col-md-2"><input type="number" class="form-control" name="stock" placeholder="Stock"/></div>
        <div class="col-md-3">
            <select class="form-select" name="categoryId" required>
                <option value="">Choose Category</option>
                <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
            </select>
        </div>
        <div class="col-md-3">
            <select class="form-select" name="brandId" required>
                <option value="">Choose Brand</option>
                <option th:each="brand : ${brands}" th:value="${brand.id}" th:text="${brand.name}"></option>
            </select>
        </div>
        <div class="col-md-3">
            <select class="form-select" name="supplierId" required>
                <option value="">Choose Supplier</option>
                <option th:each="supplier : ${suppliers}" th:value="${supplier.id}" th:text="${supplier.name}"></option>
            </select>
        </div>
        <div class="col-md-12"><button class="btn btn-success">Save</button></div>
    </form>

    <table class="table table-bordered table-striped">
        <thead><tr><th>Name</th><th>Brand</th><th>Category</th><th>Supplier</th><th>Price</th><th>Stock</th><th>ACTION</th></tr></thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.name}"></td>
            <td th:text="${product.brand.name}"></td>
            <td th:text="${product.category.name}"></td>
            <td th:text="${product.supplier.name}"></td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.stock}"></td>
            <td><a th:href="@{/staff/manage/product/delete/{id}(id=${product.id})}" class="btn btn-danger btn-sm">Delete</a></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
