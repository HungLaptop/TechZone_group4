<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<body>
<div layout:fragment="content">
    <h2>Supplier</h2>
    <form method="post" action="/staff/manage/supplier" class="row g-3 mb-4">
        <div class="col-md-5"><input class="form-control" name="name" placeholder="Name" required/></div>
        <div class="col-md-5"><input class="form-control" name="contactInfo" placeholder="Contact Info"/></div>
        <div class="col-md-2"><button class="btn btn-primary">Save</button></div>
    </form>
    <table class="table table-striped">
        <thead><tr><th>Name</th><th>Contact</th><th>Action</th></tr></thead>
        <tbody>
        <tr th:each="supplier : ${suppliers}">
            <td th:text="${supplier.name}"></td>
            <td th:text="${supplier.contactInfo}"></td>
            <td><a th:href="@{/staff/manage/supplier/delete/{id}(id=${supplier.id})}" class="btn btn-danger btn-sm">Delete</a></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
