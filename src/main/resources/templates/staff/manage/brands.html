<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<body>
<div layout:fragment="content">
    <h2>Brand</h2>
    <form method="post" action="/staff/manage/brand" class="row g-3 mb-4">
        <div class="col-md-4"><input class="form-control" name="name" placeholder="Name" required/></div>
        <div class="col-md-6"><input class="form-control" name="description" placeholder="Description"/></div>
        <div class="col-md-2"><button class="btn btn-primary">Save</button></div>
    </form>
    <table class="table table-striped">
        <thead><tr><th>Name</th><th>Description</th><th>Action</th></tr></thead>
        <tbody>
        <tr th:each="brand : ${brands}">
            <td th:text="${brand.name}"></td>
            <td th:text="${brand.description}"></td>
            <td><a th:href="@{/staff/manage/brand/delete/{id}(id=${brand.id})}" class="btn btn-danger btn-sm">Delete</a></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
