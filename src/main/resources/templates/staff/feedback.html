<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<body>
<div layout:fragment="content" class="container">
    <h2>Feedback chờ duyệt</h2>
    <table class="table">
        <thead><tr><th>User</th><th>Sản phẩm</th><th>Điểm</th><th>Nội dung</th><th>Thao tác</th></tr></thead>
        <tbody>
        <tr th:each="fb : ${pending}">
            <td th:text="${fb.user.username}"></td>
            <td th:text="${fb.product.name}"></td>
            <td th:text="${fb.rating}"></td>
            <td th:text="${fb.comment}"></td>
            <td>
                <form method="post" action="/staff/feedback/approve" style="display:inline">
                    <input type="hidden" name="id" th:value="${fb.id}"/>
                    <button class="btn btn-success btn-sm">Duyệt</button>
                </form>
                <form method="post" action="/staff/feedback/reply" class="mt-1">
                    <input type="hidden" name="id" th:value="${fb.id}"/>
                    <input name="reply" class="form-control form-control-sm" placeholder="Trả lời"/>
                    <button class="btn btn-primary btn-sm mt-1">Gửi</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
