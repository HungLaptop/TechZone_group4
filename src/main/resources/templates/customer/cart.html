<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<body>
<div layout:fragment="content" class="container">
    <h2>Giỏ hàng</h2>
    <div th:if="${cart.items.isEmpty()}">Giỏ hàng trống</div>
    <table class="table" th:if="${!cart.items.isEmpty()}">
        <thead><tr><th>SP</th><th>Giá</th><th>Số lượng</th><th>Tổng</th><th></th></tr></thead>
        <tbody>
        <tr th:each="item : ${cart.items}">
            <td th:text="${item.product.name}"></td>
            <td th:text="${#numbers.formatDecimal(item.product.price,0,'COMMA',0,'POINT')} + '₫'"></td>
            <td>
                <form method="post" action="/customer/cart/update" class="d-flex gap-2">
                    <input type="hidden" name="itemId" th:value="${item.id}"/>
                    <input type="number" name="quantity" min="1" th:value="${item.quantity}" class="form-control" style="width:100px;"/>
                    <button class="btn btn-outline">Cập nhật</button>
                </form>
            </td>
            <td th:text="${#numbers.formatDecimal(item.product.price * item.quantity,0,'COMMA',0,'POINT')} + '₫'"></td>
            <td>
                <form method="post" action="/customer/cart/remove">
                    <input type="hidden" name="itemId" th:value="${item.id}"/>
                    <button class="btn btn-danger">Xóa</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <div class="mt-3">Tổng tiền: <strong th:text="${#numbers.formatDecimal(total,0,'COMMA',0,'POINT')} + '₫'"></strong></div>

    <form method="post" action="/customer/cart/checkout" class="mt-3">
        <div class="mb-3"><input name="voucherCode" class="form-control" placeholder="Mã giảm giá (nếu có)"/></div>
        <button class="btn btn-primary">Thanh toán</button>
    </form>
</div>
</body>
</html>
