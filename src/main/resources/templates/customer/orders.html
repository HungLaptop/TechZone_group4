<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<body>
<div layout:fragment="content" class="container">
    <h2>Đơn hàng của tôi</h2>
    <table class="table">
        <thead><tr><th>ID</th><th>Tổng</th><th>Trạng thái</th><th>Ngày</th><th>Hành động</th></tr></thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${#numbers.formatDecimal(order.total,0,'COMMA',0,'POINT')} + '₫'"></td>
            <td th:text="${order.status}"></td>
            <td th:text="${order.createdAt}"></td>
            <td>
                <a th:href="@{/customer/orders/{id}(id=${order.id})}" class="btn btn-outline">Xem</a>
                <form method="post" th:action="@{/customer/orders/{id}/cancel(id=${order.id})}" style="display:inline">
                    <button class="btn btn-danger" th:if="${order.status.name() != 'CANCELLED'}">Hủy</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
