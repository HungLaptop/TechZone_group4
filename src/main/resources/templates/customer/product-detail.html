<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<body>
<div layout:fragment="content" class="container">
    <h2 th:text="${product.name}">Product Name</h2>
    <p th:text="${product.description}">Description</p>
    <p>Giá: <strong th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + '₫'"></strong></p>
    <p>Kho: <span th:text="${product.stock}"></span></p>

    <form method="post" action="/customer/cart/add">
        <input type="hidden" name="productId" th:value="${product.id}"/>
        <div class="mb-3">
            <label>Số lượng</label>
            <input type="number" name="qty" value="1" min="1" class="form-control"/>
        </div>
        <button type="submit" class="btn btn-primary">Thêm vào giỏ</button>
    </form>

    <section class="mt-4">
        <h3>Đánh giá</h3>
        <div th:each="fb : ${feedbackList}">
            <p><strong th:text="${fb.user.username}"></strong> - <span th:text="${fb.rating}"></span>/5</p>
            <p th:text="${fb.comment}"></p>
            <p th:if="${fb.reply}">Phản hồi: <span th:text="${fb.reply}"></span></p>
        </div>

        <form method="post" action="/customer/feedback">
            <input type="hidden" name="productId" th:value="${product.id}"/>
            <div class="mb-3"><textarea name="comment" class="form-control" placeholder="Viết đánh giá..."></textarea></div>
            <div class="mb-3"><input type="number" name="rating" min="1" max="5" class="form-control" placeholder="Điểm 1-5"/></div>
            <button class="btn btn-success">Gửi đánh giá</button>
        </form>
    </section>
</div>
</body>
</html>
