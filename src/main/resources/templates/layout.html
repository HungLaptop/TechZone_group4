<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">TechZone</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<header>
    <div class="header-inner">
        <a class="brand" href="/">TechZone</a>
        <div class="main-nav">
            <a href="/" class="active">Home</a>
            <a href="/customer/dashboard" th:if="${isCustomer}">Customer</a>
            <a href="/staff/dashboard" th:if="${isStaff or isAdmin}">Staff</a>
            <a href="/admin/dashboard" th:if="${isAdmin}">Admin</a>
            <a href="/chat">Chat</a>
            <a href="/dashboard/events">Realtime</a>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Tìm sản phẩm, thương hiệu, model..." aria-label="Tìm kiếm" />
        </div>
        <nav class="user-tools">
            <a href="/cart" title="Giỏ hàng">Giỏ hàng <span class="badge">0</span></a>

            <!-- Hiển thị khi CHƯA đăng nhập -->
            <a href="/login" th:if="${!isLoggedIn}">Đăng nhập</a>

            <!-- Hiển thị khi ĐÃ đăng nhập -->
            <span th:if="${isLoggedIn}" class="user-info">
                <a href="/profile" class="username-display" th:text="${username}">Username</a>
                <a href="/logout" class="btn btn-sm btn-outline-danger">Logout</a>
            </span>
        </nav>
    </div>
</header>

<main class="layout-wrapper">
    <div layout:fragment="content">
        <!-- Page content will be inserted here -->
    </div>
</main>

<footer class="footer">
    <div class="container-fluid">
        <div class="footer-links">
            <div><h4>TechZone</h4><p>Siêu thị thiết bị điện tử.</p></div>
            <div><h4>Thông tin</h4><a href="/about">About</a><br><a href="/contact">Contact</a></div>
            <div><h4>Dịch vụ</h4><a href="/customer/dashboard">User</a><br><a href="/admin/dashboard">Admin</a></div>
            <div><h4>Hỗ trợ</h4><a href="#">Chính sách</a><br><a href="#">FAQs</a></div>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.5.3/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="/js/realtime.js"></script>
</body>
</html>
