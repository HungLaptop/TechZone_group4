<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <style>
        /* Override layout-wrapper for register page */
        .layout-wrapper {
            display: block !important;
            max-width: 500px !important;
            margin: 2rem auto !important;
            padding: 0 1rem !important;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--clr-text);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--clr-primary);
            box-shadow: 0 0 0 3px rgba(14, 78, 241, 0.1);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            width: 100%;
            text-align: center;
        }

        .btn-primary {
            background: var(--clr-primary);
            color: white;
        }

        .btn-primary:hover {
            background: #0c3ec7;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(14, 78, 241, 0.3);
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .alert-danger {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .form-hint {
            font-size: 0.85rem;
            color: var(--clr-muted);
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <h2 style="margin-bottom: 1.5rem; text-align: center;">Đăng ký tài khoản</h2>

    <!-- Success/Error Messages -->
    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <!-- Register Card -->
    <div class="card">
        <div class="card-header bg-primary text-white" style="background: var(--clr-primary) !important; color: white !important; padding: 1rem; border-radius: 14px 14px 0 0;">
            <h5 style="margin: 0; font-size: 1.2rem; text-align: center;">Tạo tài khoản mới</h5>
        </div>
        <div class="card-body" style="padding: 2rem;">
            <form method="post" action="/register">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username"
                           th:value="${username}" placeholder="Nhập username"
                           minlength="3" required />
                    <div class="form-hint">Tối thiểu 3 ký tự</div>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email"
                           th:value="${email}" placeholder="Nhập email" required />
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Nhập mật khẩu" minlength="6" required />
                    <div class="form-hint">Tối thiểu 6 ký tự</div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Xác nhận Password</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                           placeholder="Nhập lại mật khẩu" minlength="6" required />
                </div>

                <button type="submit" class="btn btn-primary">Đăng ký</button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
                <span style="color: var(--clr-muted);">Đã có tài khoản?</span>
                <a href="/login" style="color: var(--clr-primary); font-weight: 600; margin-left: 0.5rem;">Đăng nhập ngay</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
