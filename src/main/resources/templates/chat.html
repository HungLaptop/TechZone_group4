<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<body>
<div layout:fragment="content">
    <h2>Real-time Chat</h2>
    <div id="chatMessages" class="border p-3 mb-3" style="height: 250px; overflow-y: auto;"></div>
    <div class="input-group">
        <input id="msgInput" type="text" class="form-control" placeholder="Type a message"/>
        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
    </div>
</div>
<script>
    const chatSocket = new SockJS('/ws');
    const chatClient = Stomp.over(chatSocket);

    chatClient.connect({}, function () {
        chatClient.subscribe('/topic/greetings', function (message) {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML += '<div>' + message.body + '</div>';
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });
    });

    function sendMessage() {
        const msg = document.getElementById('msgInput').value;
        if (!msg) return;
        chatClient.send('/app/hello', {}, msg);
        document.getElementById('msgInput').value = '';
    }
</script>
</body>
</html>
